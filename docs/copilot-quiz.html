<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Copilot Quiz</title>
<style>
  

  :root {
    --warm: #E8A020;
    --warm-light: #FDF3DC;
    --warm-dark: #A06010;
    --beg: #1D9E75;
    --beg-light: #E1F5EE;
    --beg-dark: #0F6E56;
    --int: #378ADD;
    --int-light: #E6F1FB;
    --int-dark: #185FA5;
    --adv: #7F77DD;
    --adv-light: #EEEDFE;
    --adv-dark: #534AB7;
    --swag: #D85A30;
    --swag-light: #FAECE7;
    --mc: #BA7517;
    --mc-light: #FAEEDA;
    --bg: #0d0d0d;
    --surface: #181818;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #888;
    --dim: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 40px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--text);
  }
  .topbar-logo svg { width: 28px; height: 28px; fill: var(--text); }
  .topbar-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .level-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    font-family: Arial, sans-serif;
  }
  .pill-warm { border-color: var(--warm); color: var(--warm); }
  .pill-warm.active { background: var(--warm); color: #fff; }
  .pill-beg { border-color: var(--beg); color: var(--beg); }
  .pill-beg.active { background: var(--beg); color: #fff; }
  .pill-int { border-color: var(--int); color: var(--int); }
  .pill-int.active { background: var(--int); color: #fff; }
  .pill-adv { border-color: var(--adv); color: var(--adv); }
  .pill-adv.active { background: var(--adv); color: #fff; }
  .pill-warm:hover:not(.active) { background: rgba(232,160,32,0.1); }
  .pill-beg:hover:not(.active) { background: rgba(29,158,117,0.1); }
  .pill-int:hover:not(.active) { background: rgba(55,138,221,0.1); }
  .pill-adv:hover:not(.active) { background: rgba(127,119,221,0.1); }

  /* MAIN LAYOUT */
  .main {
    flex: 1;
    display: flex;
    align-items: stretch;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    border-right: 0.5px solid var(--border);
    overflow-y: auto;
    padding: 20px 0 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }
  .sidebar-section {
    padding: 0 12px;
    margin-bottom: 24px;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 0 8px;
    margin-bottom: 8px;
  }
  .q-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.12s;
    line-height: 1.3;
  }
  .q-item:hover { background: var(--surface2); color: var(--text); }
  .q-item.active { background: var(--surface2); color: var(--text); font-weight: 500; }
  .q-item.revealed .dot { background: var(--warm); }
  .q-item.revealed.beg .dot { background: var(--beg); }
  .q-item.revealed.int .dot { background: var(--int); }
  .q-item.revealed.adv .dot { background: var(--adv); }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .q-item-num { color: var(--dim); font-size: 11px; min-width: 20px; }

  /* CONTENT AREA */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* PROGRESS */
  .progress-track {
    height: 3px;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    transition: width 0.3s, background 0.3s;
  }

  /* QUESTION AREA */
  .question-area {
    flex: 1;
    overflow-y: auto;
    padding: 48px 64px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .q-header {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }
  .badge-warm { background: var(--warm-light); color: var(--warm-dark); }
  .badge-beg { background: var(--beg-light); color: var(--beg-dark); }
  .badge-int { background: var(--int-light); color: var(--int-dark); }
  .badge-adv { background: var(--adv-light); color: var(--adv-dark); }
  .badge-mc { background: var(--mc-light); color: var(--mc); }
  .badge-swag {
    background: var(--swag-light);
    color: var(--swag);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .q-counter {
    font-size: 13px;
    color: var(--muted);
    margin-left: auto;
  }

  .q-text {
    font-family: Arial, sans-serif;
    font-size: clamp(20px, 2.8vw, 32px);
    font-weight: 600;
    line-height: 1.35;
    color: var(--text);
    max-width: 820px;
  }

  /* CHOICES */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 820px;
  }
  .choice {
    padding: 14px 18px;
    border-radius: 10px;
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    font-size: 14px;
    color: #ccc;
    line-height: 1.4;
  }
  .choice .choice-key {
    font-weight: 600;
    margin-right: 8px;
    color: var(--muted);
  }

  /* ANSWER SECTION */
  .answer-section {
    max-width: 820px;
  }
  .reveal-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid;
    transition: all 0.15s;
    font-family: Arial, sans-serif;
  }
  .reveal-warm { border-color: var(--warm); color: var(--warm); background: transparent; }
  .reveal-warm:hover { background: var(--warm); color: #fff; }
  .reveal-beg { border-color: var(--beg); color: var(--beg); background: transparent; }
  .reveal-beg:hover { background: var(--beg); color: #fff; }
  .reveal-int { border-color: var(--int); color: var(--int); background: transparent; }
  .reveal-int:hover { background: var(--int); color: #fff; }
  .reveal-adv { border-color: var(--adv); color: var(--adv); background: transparent; }
  .reveal-adv:hover { background: var(--adv); color: #fff; }

  .answer-card {
    display: none;
    padding: 24px 28px;
    border-radius: 12px;
    border-left: 3px solid;
    background: var(--surface2);
    animation: slideIn 0.2s ease;
  }
  .answer-card.shown { display: block; }
  .answer-card.warm { border-left-color: var(--warm); }
  .answer-card.beg { border-left-color: var(--beg); }
  .answer-card.int { border-left-color: var(--int); }
  .answer-card.adv { border-left-color: var(--adv); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .answer-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .answer-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
  }
  .answer-text strong {
    font-weight: 600;
  }
  .swag-banner {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--swag-light);
    color: var(--swag);
    font-size: 12px;
    font-weight: 600;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 64px;
    border-top: 0.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    border-radius: 8px;
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: Arial, sans-serif;
  }
  .nav-btn:hover:not(:disabled) { border-color: rgba(255,255,255,0.3); background: #2a2a2a; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .nav-btn.primary:hover { opacity: 0.85; }
  .nav-center { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .nav-pos { font-size: 15px; font-weight: 600; color: var(--text); }
  .nav-total { font-size: 11px; color: var(--muted); }

  /* SIDEBAR BOTTOM */
  .sidebar-bottom {
    border-top: 0.5px solid var(--border);
    padding: 16px 20px 20px;
    margin-top: auto;
  }
  .score-tray-title { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
  .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; color: var(--muted); }
  .score-dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 7px; display: inline-block; flex-shrink: 0; }
  .score-val { font-weight: 600; color: var(--text); font-size: 12px; }
  .reset-btn {
    width: 100%;
    margin-top: 14px;
    padding: 8px 0;
    border-radius: 7px;
    border: 0.5px solid rgba(220,60,60,0.4);
    background: rgba(220,60,60,0.08);
    color: #e07070;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .reset-btn:hover { background: rgba(220,60,60,0.18); border-color: rgba(220,60,60,0.7); color: #f09090; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
    </svg>
    GitHub Copilot Quiz
  </div>
  <div class="topbar-right">
    <button class="level-pill pill-warm active" id="tab-war" onclick="switchLevel('warmup')">☀ Warm Up</button>
    <button class="level-pill pill-beg" id="tab-beg" onclick="switchLevel('beginner')">● Beginner</button>
    <button class="level-pill pill-int" id="tab-int" onclick="switchLevel('intermediate')">● Intermediate</button>
    <button class="level-pill pill-adv" id="tab-adv" onclick="switchLevel('advanced')">● Advanced</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <!-- filled by JS -->
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:20%; background: var(--warm);"></div>
    </div>
    <div class="question-area" id="question-area">
      <!-- filled by JS -->
    </div>
    <div class="bottom-nav">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Prev</button>
      <div class="nav-center">
        <span class="nav-pos" id="nav-pos">1 / 5</span>
        <span class="nav-total" id="nav-total">Warm Up</span>
      </div>
      <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>
</div>

<script>
const questions = {
  warmup: [
    {
      q: "First person to share — how are you using Copilot today?",
      mc: false,
      swag: false,
      open: true,
      answer: "No wrong answer here! Whether it's code completions, chat, PR reviews, CLI, or you're just getting started — every use case counts. This is about learning from each other."
    },
    {
      q: "Which AI model are you running in Copilot, and why did you pick it?",
      mc: false,
      swag: false,
      open: true,
      answer: "GitHub Copilot supports multiple models including GPT-4o, Claude Sonnet, Gemini, and others depending on your plan. There's no single right answer — the best model depends on your workflow, language, and what feels most natural to you."
    },
    {
      q: "If Copilot were a person, where would they work — and what would their job title be?",
      mc: false,
      swag: false,
      open: true,
      answer: "Totally open! Some say 'the colleague who never sleeps,' others say 'staff engineer at every company simultaneously.' The fun is in how you see it — Copilot is whatever kind of teammate you need it to be."
    },
    {
      q: "Does Copilot wear glasses?",
      mc: true,
      swag: false,
      open: true,
      choices: ["A. Obviously yes — the smart ones always do", "B. No — too cool for that", "C. It sees all code with perfect clarity, glasses optional", "D. Depends on the model"],
      answer: "All answers are correct. This is a vibe check, not a technical question. Though D is arguably the most accurate — different models, different aesthetics."
    },
    {
      q: "One word to describe your Copilot experience so far. Go.",
      mc: false,
      swag: false,
      open: true,
      answer: "No wrong answers. Common ones: fast, magical, surprising, frustrating, game-changing, weird, helpful, wild. Whatever your one word is — it's valid, and it's the start of a good conversation."
    },
    {
      q: "What's the first thing you'd teach a brand new developer about Copilot?",
      mc: false,
      swag: false,
      open: true,
      answer: "Open floor! Great answers range from 'always review what it gives you' to 'write better comments and you'll get better suggestions' to 'just start using it and you'll figure it out.' Everyone's first lesson is different."
    },
    {
      q: "Has Copilot ever surprised you — in a good way or a bad way? Tell us.",
      mc: false,
      swag: false,
      open: true,
      answer: "This one's all yours. The surprises people share — good and bad — usually teach the room more than any slide deck. No wrong answer."
    },
    {
      q: "If you had to give Copilot a performance review today, what rating would you give it?",
      mc: true,
      swag: false,
      open: true,
      choices: ["A. Exceeds expectations — already getting a raise", "B. Meets expectations — solid teammate, room to grow", "C. Needs improvement — promising but inconsistent", "D. It reviewed me first and honestly I'm still processing it"],
      answer: "All valid — and D is a real phenomenon. The point is to talk about where it's delivering and where it's falling short for your team. That conversation is worth more than the rating."
    },
    {
      q: "What would Copilot's LinkedIn headline say?",
      mc: false,
      swag: false,
      open: true,
      answer: "Completely open. Past answers have included: 'AI pair programmer | 500M+ lines suggested | Open to all repos,' 'Helping developers ship faster | Not a replacement, a teammate,' and 'Currently: everywhere at once.' What would yours say?"
    }
  ],
  beginner: [
    {
      q: "What is GitHub Copilot?",
      mc: false,
      swag: true,
      answer: "GitHub Copilot is an AI-powered coding assistant developed by GitHub and OpenAI. It suggests whole lines or blocks of code as you type, directly inside your editor — acting like a pair programmer that's always available."
    },
    {
      q: "Which of the following best describes how GitHub Copilot generates code suggestions?",
      mc: true,
      swag: false,
      choices: ["A. It searches Stack Overflow in real time", "B. It uses an AI model trained on publicly available code to generate completions", "C. It copies code from the repository you are currently working in", "D. It runs a small local model stored on your machine"],
      answer: "B — It uses an AI model trained on publicly available code. The model was trained on billions of lines of public source code and uses your current file context to generate relevant suggestions."
    },
    {
      q: "What editors and IDEs does GitHub Copilot support?",
      mc: false,
      swag: true,
      answer: "GitHub Copilot supports VS Code, Visual Studio, JetBrains IDEs (IntelliJ, PyCharm, WebStorm, Rider, and others), Neovim, and GitHub.com's web editor — covering the most common developer environments."
    },
    {
      q: "What keyboard shortcut accepts a GitHub Copilot inline suggestion in VS Code?",
      mc: false,
      swag: false,
      answer: "Press the Tab key to accept a Copilot inline suggestion in VS Code. You can press Escape to dismiss it or use Alt+] / Alt+[ to cycle through alternate suggestions."
    },
    {
      q: "Which of these is an actual GitHub Copilot product?",
      mc: true,
      swag: true,
      choices: ["A. Copilot Chat", "B. Copilot Runner", "C. Copilot Studio", "D. Copilot Debugger"],
      answer: "A — Copilot Chat is a real GitHub product. It lets you have a natural language conversation about your code directly inside your editor or on GitHub.com — asking questions, debugging, and getting explanations."
    },
    {
      q: "Does GitHub Copilot require an internet connection to work?",
      mc: false,
      swag: false,
      answer: "Yes — GitHub Copilot sends context from your current code to GitHub's servers and receives suggestions back. It requires an active internet connection and cannot function fully offline."
    },
    {
      q: "What programming languages does GitHub Copilot support?",
      mc: false,
      swag: true,
      answer: "GitHub Copilot supports dozens of languages. It works especially well with Python, JavaScript, TypeScript, Ruby, Go, C#, C++, Java, PHP, and many others. It performs best in languages heavily represented in its training data."
    },
    {
      q: "Can you trigger GitHub Copilot suggestions by writing a comment?",
      mc: false,
      swag: false,
      answer: "Yes — writing a natural language comment like '// function to sort a list of users by last name' will prompt Copilot to suggest a full implementation. Comments are one of the most effective ways to guide Copilot's output."
    },
    {
      q: "What is GitHub Copilot Chat used for?",
      mc: false,
      swag: true,
      answer: "Copilot Chat lets you ask questions about your code in plain English — debugging issues, explaining what code does, suggesting refactors, generating tests, or getting guidance on how to approach a problem, all inside your editor."
    },
    {
      q: "True or false: GitHub Copilot can suggest entire functions based on a comment you write.",
      mc: false,
      swag: false,
      answer: "True — write a comment describing what you want (e.g. '// parse a CSV file and return an array of objects') and Copilot will generate a full function to match. This is one of its most powerful use cases."
    },
    {
      q: "What is the difference between Copilot Free and a paid Copilot plan?",
      mc: true,
      swag: true,
      choices: ["A. Free has no chat, paid unlocks chat", "B. Free has monthly limits on completions and chat; paid plans offer more usage and features", "C. Free only works in VS Code", "D. There is no free tier — Copilot requires a subscription"],
      answer: "B — GitHub Copilot Free includes a limited number of code completions and chat messages per month. Paid plans (Pro, Business, Enterprise) remove or raise those limits and unlock additional features like policy controls and audit logs."
    },
    {
      q: "What does it mean when Copilot shows a 'ghost text' suggestion?",
      mc: false,
      swag: false,
      answer: "Ghost text is the greyed-out suggestion Copilot displays inline as you type. It's a preview of what Copilot thinks you're about to write. Press Tab to accept it, Escape to dismiss it, or keep typing to ignore it and let Copilot recalculate."
    },
    {
      q: "Can GitHub Copilot help write tests as well as production code?",
      mc: false,
      swag: true,
      answer: "Yes — Copilot is particularly good at generating unit tests. You can describe what you want tested in a comment, open a test file alongside your code, or use Copilot Chat with a prompt like '/tests' to generate a test suite for a selected function."
    },
    {
      q: "What does the slash command /explain do in Copilot Chat?",
      mc: true,
      swag: false,
      choices: ["A. It opens GitHub documentation", "B. It asks Copilot to explain the selected code in plain language", "C. It generates a README for your repo", "D. It summarizes your git commit history"],
      answer: "B — The /explain slash command tells Copilot Chat to walk through the selected code and describe what it does in plain English. It's a quick way to understand unfamiliar code or prepare to explain it to someone else."
    },
    {
      q: "Where can you access GitHub Copilot outside of your editor?",
      mc: false,
      swag: true,
      answer: "Beyond your IDE, Copilot is available on GitHub.com (in pull requests, issues, and the file editor), in the terminal via Copilot CLI, and now in the GitHub Copilot desktop app announced at Microsoft Build 2026."
    }
  ],
  intermediate: [
    {
      q: "What context does GitHub Copilot use when generating code suggestions?",
      mc: false,
      swag: true,
      answer: "Copilot uses the content of your open file, adjacent open tabs in your editor, and any comments or prompts you write. It does not have access to your full repository by default — context is limited to what's open in the editor session."
    },
    {
      q: "Which GitHub Copilot feature lets you plan and implement multi-file changes starting from a GitHub issue?",

let currentLevel = 'warmup';
let currentIndex = 0;
const revealed = { warmup: {}, beginner: {}, intermediate: {}, advanced: {} };

function levelColor(l) {
  if (l === 'warmup') return 'var(--warm)';
  if (l === 'beginner') return 'var(--beg)';
  if (l === 'intermediate') return 'var(--int)';
  return 'var(--adv)';
}
function levelClass(l) {
  if (l === 'warmup') return 'warm';
  if (l === 'beginner') return 'beg';
  if (l === 'intermediate') return 'int';
  return 'adv';
}
function levelLabel(l) {
  if (l === 'warmup') return 'Warm Up';
  if (l === 'beginner') return 'Beginner';
  if (l === 'intermediate') return 'Intermediate';
  return 'Advanced';
}

function switchLevel(level) {
  currentLevel = level;
  currentIndex = 0;
  const tabMap = { warmup: 'war', beginner: 'beg', intermediate: 'int', advanced: 'adv' };
  Object.keys(tabMap).forEach(l => {
    const tab = document.getElementById('tab-' + tabMap[l]);
    if (tab) tab.classList.toggle('active', l === level);
  });
  renderSidebar();
  renderQuestion();
}

function navigate(dir) {
  const total = questions[currentLevel].length;
  currentIndex = Math.max(0, Math.min(total - 1, currentIndex + dir));
  renderSidebar();
  renderQuestion();
}

function goTo(index) {
  currentIndex = index;
  renderSidebar();
  renderQuestion();
}

function revealAnswer() {
  revealed[currentLevel][currentIndex] = true;
  renderQuestion();
  renderSidebar();
}

function resetAll() {
  if (!confirm('Reset all revealed answers across all levels?')) return;
  revealed.warmup = {};
  revealed.beginner = {};
  revealed.intermediate = {};
  revealed.advanced = {};
  currentIndex = 0;
  renderSidebar();
  renderQuestion();
}

function renderSidebar() {
  const qs = questions[currentLevel];
  const lc = levelClass(currentLevel);
  let html = '<div class="sidebar-section"><div class="sidebar-label">' + levelLabel(currentLevel) + '</div>';
  qs.forEach((q, i) => {
    const isActive = i === currentIndex;
    const isRevealed = revealed[currentLevel][i];
    const short = q.q.length > 52 ? q.q.substring(0, 52) + '…' : q.q;
    html += `<div class="q-item ${isActive ? 'active' : ''} ${isRevealed ? 'revealed ' + lc : ''}" onclick="goTo(${i})">
      <span class="dot"></span>
      <span class="q-item-num">Q${i+1}</span>
      <span>${short}</span>
    </div>`;
  });
  html += '</div>';

  const warmCount = Object.keys(revealed.warmup).length;
  const begCount = Object.keys(revealed.beginner).length;
  const intCount = Object.keys(revealed.intermediate).length;
  const advCount = Object.keys(revealed.advanced).length;
  const warmTotal = questions.warmup.length;
  const begTotal = questions.beginner.length;
  const intTotal = questions.intermediate.length;
  const advTotal = questions.advanced.length;

  html += `<div class="sidebar-bottom">
    <div class="score-tray-title">Revealed</div>
    <div class="score-row"><span><span class="score-dot" style="background:var(--warm)"></span>Warm Up</span><span class="score-val">${warmCount} / ${warmTotal}</span></div>
    <div class="score-row"><span><span class="score-dot" style="background:var(--beg)"></span>Beginner</span><span class="score-val">${begCount} / ${begTotal}</span></div>
    <div class="score-row"><span><span class="score-dot" style="background:var(--int)"></span>Intermediate</span><span class="score-val">${intCount} / ${intTotal}</span></div>
    <div class="score-row"><span><span class="score-dot" style="background:var(--adv)"></span>Advanced</span><span class="score-val">${advCount} / ${advTotal}</span></div>
    <button class="reset-btn" onclick="resetAll()">↺ Reset all answers</button>
  </div>`;
  document.getElementById('sidebar').innerHTML = html;
}

function renderQuestion() {
  const qs = questions[currentLevel];
  const q = qs[currentIndex];
  const lc = levelClass(currentLevel);
  const ll = levelLabel(currentLevel);
  const total = qs.length;
  const isRevealed = revealed[currentLevel][currentIndex];

  const pct = ((currentIndex + 1) / total * 100).toFixed(0);
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = levelColor(currentLevel);

  document.getElementById('nav-pos').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('nav-total').textContent = ll;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === total - 1;

  let badgesHtml = `<span class="badge badge-${lc}">${ll}</span>`;
  if (q.open) badgesHtml += `<span class="badge badge-mc">Open ended</span>`;
  else if (q.mc) badgesHtml += `<span class="badge badge-mc">Multiple choice</span>`;
  if (q.swag) badgesHtml += `<span class="badge badge-swag">🎁 Prize eligible</span>`;
  badgesHtml += `<span class="q-counter">Q${currentIndex + 1} of ${total}</span>`;

  let choicesHtml = '';
  if (q.mc && q.choices) {
    choicesHtml = '<div class="choices">' + q.choices.map(c => {
      const key = c.charAt(0);
      const text = c.substring(3);
      return `<div class="choice"><span class="choice-key">${key}.</span>${text}</div>`;
    }).join('') + '</div>';
  }

  let answerHtml = '';
  if (isRevealed) {
    answerHtml = `<div class="answer-card shown ${lc}">
      <div class="answer-label">${q.open ? 'Discussion' : 'Answer'}</div>
      <div class="answer-text">${q.answer}</div>
      ${q.swag ? '<div class="swag-banner">🎁 This question is prize eligible!</div>' : ''}
    </div>`;
  } else {
    const revClass = `reveal-${lc}`;
    const btnLabel = q.open ? '▶ Open Discussion' : '▶ Reveal Answer';
    answerHtml = `<button class="reveal-btn ${revClass}" onclick="revealAnswer()">${btnLabel}</button>`;
  }

  document.getElementById('question-area').innerHTML = `
    <div class="q-header">${badgesHtml}</div>
    <div class="q-text">${q.q}</div>
    ${choicesHtml}
    <div class="answer-section">${answerHtml}</div>
  `;
}

renderSidebar();
renderQuestion();
</script>
