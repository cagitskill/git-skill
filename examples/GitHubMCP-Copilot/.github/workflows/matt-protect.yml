name: Matt - Protect Bot Files

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/matt-*.yml'
      - '.github/CODEOWNERS'

jobs:
  protect:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Block unauthorized changes to Matt's files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { pull_request, repository } = context.payload;
            const owner = repository.owner.login;
            const repo = repository.name;
            const author = pull_request.user.login;

            // Only the repo owner is allowed to modify Matt's files
            const ALLOWED_USERS = [owner];

            if (ALLOWED_USERS.includes(author)) {
              // Owner touching their own bot - that's fine
              return;
            }

            // Close the PR immediately
            await github.rest.pulls.update({
              owner, repo,
              pull_number: pull_request.number,
              state: 'closed',
            });

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: pull_request.number,
              body: [
                `**Matt the Maintainer** - this PR has been automatically closed.`,
                ``,
                `Changes to Matt's workflow files (\`.github/workflows/matt-*.yml\`, \`.github/CODEOWNERS\`) are restricted to the repository owner. These files are not open to community contributions.`,
                ``,
                `If you believe this was triggered in error, contact a maintainer directly.`,
              ].join('\n'),
            });

            core.setFailed(`PR closed: unauthorized changes to protected bot files by @${author}.`);
